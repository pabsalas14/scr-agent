version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: scr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scr_secret}
      POSTGRES_DB: ${POSTGRES_DB:-scr_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis (optional caching)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: scr-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-scr}:${POSTGRES_PASSWORD:-scr_secret}@db:5432/${POSTGRES_DB:-scr_agent}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      BACKEND_PORT: 3001
      FRONTEND_URL: http://localhost
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3001:3001"
    volumes:
      - git_cache:/tmp/git-cache
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────
  # Frontend (Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_SOCKET_URL: ""
    container_name: scr-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  git_cache:
