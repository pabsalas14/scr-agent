# ============================================================================
# DOCKER COMPOSE - Desarrollo Local
# ============================================================================
#
# Solo levanta PostgreSQL para desarrollo. El backend y frontend
# corren localmente con hot-reload (pnpm dev).
#
# Uso:
#   docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: scr-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: scragent
      POSTGRES_PASSWORD: scragent_secret
      POSTGRES_DB: scragent_db
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scragent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
